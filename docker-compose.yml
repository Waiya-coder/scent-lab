services:
  postgres:
    image: postgres:15
    container_name: scent-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scent_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - scent_lab_postgres_data:/var/lib/postgresql/data

volumes:
  scent_lab_postgres_data:
